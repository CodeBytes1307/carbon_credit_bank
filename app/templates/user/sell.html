{% extends 'base.html' %}
{% block title %}Sell Credits — Carbon Credit Bank{% endblock %}

{% block content %}
<div class="container" style="max-width:640px;">
    <header class="page-header">
        <div>
            <h1>Sell credits</h1>
            <p>List an owned batch on the marketplace at your chosen price.</p>
        </div>
    </header>

    <div class="card">
        <div class="card-body">
            <form method="post">
                <div class="form-group">
                    <label for="batch">Select owned batch</label>
                    <select name="batch_id" id="batch" class="form-control">
                        {% for batch in owned_batches %}
                        <option value="{{ batch.batch_id }}">
                            {{ batch.project_name }} — {{ batch.quantity_available }} available
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="unit_price">Price per credit</label>
                    <input type="number" name="unit_price" id="unit_price" min="0.01" step="0.01" class="form-control" required>
                </div>
                <button type="submit" class="btn buy-btn btn-block btn-lg">List for sale</button>
            </form>
            {% if success %}<div class="success">{{ success }}</div>{% endif %}
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </div>
    </div>
</div>
{% endblock %}
