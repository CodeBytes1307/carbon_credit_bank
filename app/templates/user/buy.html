{% extends 'base.html' %}
{% block title %}Buy Credits — Carbon Credit Bank{% endblock %}

{% block content %}
<div class="container" style="max-width:640px;">
    <header class="page-header">
        <div>
            <h1>Buy credits</h1>
            <p>Select a batch and the quantity you want to purchase.</p>
        </div>
    </header>

    <div class="card">
        <div class="card-body">
            <form method="post" class="buy-form">
                <div class="form-group">
                    <label for="batch">Select batch</label>
                    <select name="batch_id" id="batch" class="form-control">
                        {% for batch in batches %}
                        <option value="{{ batch.batch_id }}">
                            {{ batch.project_name }} — {{ batch.quantity_available }} available @ {{ batch.unit_price }} {{ batch.currency }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" name="quantity" id="quantity" min="1" max="{{ batches[0].quantity_available if batches else 1 }}" class="form-control" required>
                </div>
                <button type="submit" class="btn buy-btn btn-block btn-lg">Buy credits</button>
            </form>
            {% if success %}<div class="success">{{ success }}</div>{% endif %}
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </div>
    </div>
</div>
{% endblock %}
